{% extends "base.html" %}
{% block title %}Login · English WhatsApp Poll Bot{% endblock %}
{% block body %}
<header class="topbar">
  <div>
    <h1>Login</h1>
    <p>Pick a tenant account and sign in.</p>
  </div>
  <a class="button secondary" href="/">Landing</a>
</header>
<main>
  {% if error %}
    <div class="alert error">{{ error }}</div>
  {% endif %}
  <section class="panel login-panel">
    <form method="post" action="/login" class="config-form">
      <label>
        Username
        <input type="text" name="username" autocomplete="username" required>
      </label>
      <label>
        Password
        <input type="password" name="password" autocomplete="current-password" required>
      </label>
      <div class="actions">
        <button class="button" type="submit">Sign In</button>
      </div>
    </form>
  </section>
</main>
{% endblock %}
