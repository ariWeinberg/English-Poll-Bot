services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: english_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d english_bot"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/english_bot
      SESSION_SECRET: change-this-before-production
      JWT_SECRET: change-this-before-production
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - uploads_data:/app/uploads

  ui:
    build: ./web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8988:80"

volumes:
  postgres_data:
  uploads_data:
