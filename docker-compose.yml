services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: english_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d english_bot"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/english_bot
      SESSION_SECRET: change-this-before-production
      JWT_SECRET: change-this-before-production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

  ui:
    build: ./web
    depends_on:
      - api
    ports:
      - "8988:80"

volumes:
  postgres_data:
  uploads_data:
