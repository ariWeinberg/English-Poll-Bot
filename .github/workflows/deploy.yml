name: Deploy

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-deploy
  cancel-in-progress: false

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: python -m pip install -e ".[dev]"

      - name: Compile Python
        run: python -m compileall app tests

      - name: Lint Python
        run: ruff check app tests

      - name: Check Python formatting
        run: ruff format --check app tests

      - name: Test backend
        run: pytest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Typecheck frontend
        working-directory: web
        run: npm run typecheck

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Validate Compose config
        run: docker compose config --quiet

  deploy:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: release
    steps:
      - name: Prepare SSH access
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          : "${DEPLOY_HOST:?Missing DEPLOY_HOST}"
          : "${SSH_PRIVATE_KEY:?Missing SSH_PRIVATE_KEY}"

          SSH_PORT="${DEPLOY_PORT:-22}"

          install -d -m 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H -p "$SSH_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy release branch on server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          : "${DEPLOY_HOST:?Missing DEPLOY_HOST}"
          : "${DEPLOY_USER:?Missing DEPLOY_USER}"
          : "${DEPLOY_PATH:?Missing DEPLOY_PATH}"

          SSH_PORT="${DEPLOY_PORT:-22}"

          ssh -i ~/.ssh/id_ed25519 -p "$SSH_PORT" -o IdentitiesOnly=yes "${DEPLOY_USER}@${DEPLOY_HOST}" "DEPLOY_PATH=$DEPLOY_PATH bash -se" <<'EOF'
          set -euo pipefail
          cd "$DEPLOY_PATH"
          git fetch origin release
          git checkout release
          git pull --ff-only origin release
          docker-compose down --remove-orphans
          docker-compose up -d --build --remove-orphans
          EOF

      - name: Smoke test public endpoint
        env:
          DEPLOY_BASE_URL: ${{ secrets.DEPLOY_BASE_URL }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          set -euo pipefail
          BASE_URL="${DEPLOY_BASE_URL:-http://${DEPLOY_HOST}:8988}"

          for attempt in $(seq 1 30); do
            if curl -fsS "${BASE_URL}/api/v1/health" >/dev/null && curl -fsS "${BASE_URL}/" >/dev/null; then
              exit 0
            fi
            sleep 5
          done

          echo "Smoke test failed for ${BASE_URL}" >&2
          curl -fsS "${BASE_URL}/api/v1/health" >&2 || true
          exit 1
